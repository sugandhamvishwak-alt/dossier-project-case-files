<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dossier Project - Case Files Database</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>📁 Dossier Project</h1>
            <p>Declassified Criminal Cases & Unsolved Mysteries Database</p>
            <p class="tagline">US & UK Law Enforcement Cases</p>
        </header>

        <!-- Search and Filter Section -->
        <div class="search-section">
            <div class="search-box">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Search case by name... (e.g., Zodiac, Black Dahlia)"
                    class="search-input"
                >
            </div>

            <div class="filters">
                <div class="filter-group">
                    <label for="countryFilter">Country:</label>
                    <select id="countryFilter" class="filter-select">
                        <option value="">All Countries</option>
                        <option value="US">United States</option>
                        <option value="UK">United Kingdom</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="typeFilter">Case Type:</label>
                    <select id="typeFilter" class="filter-select">
                        <option value="">All Types</option>
                        <option value="serial-killer">Serial Killer</option>
                        <option value="homicide-unsolved">Homicide</option>
                        <option value="serial-killer-dismemberment">Dismemberment</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="statusFilter">Status:</label>
                    <select id="statusFilter" class="filter-select">
                        <option value="">All Status</option>
                        <option value="unsolved">Unsolved</option>
                        <option value="solved">Solved</option>
                    </select>
                </div>

                <button id="resetFilters" class="reset-btn">Reset Filters</button>
            </div>
        </div>

        <!-- Results Section -->
        <div class="results-section">
            <h2 id="resultsTitle">All Cases</h2>
            
            <div id="casesList" class="cases-grid">
                <!-- Cases will be dynamically loaded here -->
                <p class="loading">Loading cases...</p>
            </div>
        </div>

        <!-- Case Detail Modal -->
        <div id="caseModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <div id="caseDetail"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
